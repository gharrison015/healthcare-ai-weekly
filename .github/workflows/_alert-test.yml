name: _Alert Test (temp)

# Throwaway: forces a failure and exercises the keepalive's email-alert path
# end to end (Resend creds in Actions + delivery to Greg). Delete after verifying.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Force failure (simulate paused project)
        run: exit 1

      - name: Alert by email (TEST)
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${RESEND_API_KEY:-}" ]; then echo "no RESEND_API_KEY; cannot alert"; exit 1; fi
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          html="<p><b>[TEST]</b> This confirms the Supabase keepalive failure alert reaches you. If you got this email, alerting works. No action needed — safe to ignore.</p><p>Run: <a href=\"${run_url}\">${run_url}</a></p>"
          payload=$(printf '{"from":"Healthcare AI Weekly <newsletter@healthcareaibrief.com>","to":["gharrison@guidehouse.com","gharrison015@gmail.com"],"subject":"[TEST] Supabase keepalive alert — please ignore","html":%s}' "$(python3 -c 'import json,sys;print(json.dumps(sys.argv[1]))' "$html")")
          resp=$(curl -sS -m 20 -w $'\n%{http_code}' -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$payload")
          echo "Resend response: ${resp}"
          echo "${resp}" | tail -1 | grep -q "200" && echo "TEST ALERT SENT OK" || { echo "TEST ALERT FAILED"; exit 1; }
