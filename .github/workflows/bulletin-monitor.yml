name: Bulletin Monitor

on:
  schedule:
    # Every 4 hours weekdays: 10am/2pm/6pm/10pm UTC = 6am/10am/2pm/6pm ET (EDT).
    # Drifts by 1h during EST (Nov-Mar) but stays within business hours either way.
    - cron: '0 10,14,18,22 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: bulletin-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run bulletin pipeline
        working-directory: pipeline
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python -m bulletin.bulletin_pipeline --cloud-mode

      - name: Propagate heartbeat to content/
        run: |
          mkdir -p content/bulletins
          cp pipeline/data/bulletins/_last_run.json content/bulletins/_last_run.json

      - name: Write bulletins from candidates
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/write_bulletins.py

      - name: Promote qualifying bulletins to consulting-intelligence
        working-directory: pipeline
        continue-on-error: true
        run: python -m consulting_intelligence.promoter --apply

      - name: Commit and push
        run: |
          git config user.email "gh-actions@healthcareaibrief.com"
          git config user.name  "Healthcare AI Weekly Bot"
          git add content/
          if git diff --cached --quiet; then
            echo "No bulletin changes to commit."
            exit 0
          fi
          ACTIVE=$(find content/bulletins -maxdepth 1 -name '*.json' ! -name '_*' | wc -l | xargs)
          git commit -m "bulletin: run $(date -u '+%Y-%m-%d %H:%MZ') (${ACTIVE} active)"
          git push

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bulletin-run-${{ github.run_id }}
          path: |
            pipeline/data/bulletins/_candidates.json
            pipeline/data/bulletins/_last_run.json
          retention-days: 7
          if-no-files-found: warn
