name: Supabase Keepalive

on:
  schedule:
    - cron: '17 13 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping subscribers table
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/body -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/subscribers?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")
          echo "HTTP ${code}"
          head -c 500 /tmp/body || true
          echo
          if [ "${code}" != "200" ]; then
            echo "Keepalive failed — Supabase may be paused or creds rotated."
            exit 1
          fi
