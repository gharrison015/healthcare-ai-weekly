name: Weekly Newsletter

on:
  schedule:
    # Target send window: 5:00-6:30 AM ET, every Friday, year-round.
    #
    # GitHub cron is UTC-only and best-effort (runs are delayed under load
    # and occasionally dropped). So instead of one punctual cron, we STACK
    # attempts every 15 min and let the "guard" step below drop any attempt
    # that lands outside the real ET window or after the issue is published.
    # The first attempt GitHub actually grants a runner does the send; the
    # rest are ~15s no-ops via the already-published guard + concurrency group.
    #
    # The :07/:22/:37/:52 offset dodges the top-of-hour load spike.
    # The 9-11 UTC span covers BOTH daylight regimes:
    #   EDT (Mar-Nov): 5:00-6:30 ET = 09:00-10:30 UTC
    #   EST (Nov-Mar): 5:00-6:30 ET = 10:00-11:30 UTC
    # Out-of-window attempts (e.g. 09:07 UTC during EST = 4:07 ET) are
    # skipped by the ET-window guard, so they never send early/late.
    - cron: '7,22,37,52 9-11 * * 5'
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Issue date (YYYY-MM-DD). Blank = today (UTC).'
        required: false
        default: ''
      dry_run:
        description: 'Generate only. Skip email send and git push.'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: weekly-newsletter
  cancel-in-progress: false

jobs:
  newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Compute issue date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date_override }}" ]; then
            DATE="${{ github.event.inputs.date_override }}"
          else
            DATE="$(date -u '+%Y-%m-%d')"
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "Issue date: $DATE"

      - name: Skip if outside ET window or already published
        id: guard
        run: |
          DATE="${{ steps.date.outputs.date }}"

          # On SCHEDULED runs only, enforce the 5:00-6:30am ET send window.
          # The crons fan out across 9-11 UTC (covering both EDT and EST);
          # this guard drops any attempt whose real ET wall-clock time is
          # outside the window, so we never send early or late regardless of
          # daylight saving. Manual workflow_dispatch runs bypass this check
          # so you can trigger a send at any time.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            NOW_ET=$((10#$(TZ='America/New_York' date '+%H%M')))
            if [ "$NOW_ET" -lt 500 ] || [ "$NOW_ET" -gt 630 ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Now $(TZ='America/New_York' date '+%H:%M %Z') is outside the 05:00-06:30 ET window. Skipping this attempt."
              exit 0
            fi
          fi

          if [ -f "content/issues/$DATE/index.html" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Issue $DATE already published. Skipping (an earlier attempt already sent it)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Issue $DATE not yet published and within window. Proceeding."
          fi

      - name: Run collector
        if: steps.guard.outputs.skip != 'true'
        working-directory: pipeline
        run: python pipeline.py --date ${{ steps.date.outputs.date }} --stage collector

      - name: Run curator
        if: steps.guard.outputs.skip != 'true'
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline.py --date ${{ steps.date.outputs.date }} --stage curator

      - name: Run generator
        if: steps.guard.outputs.skip != 'true'
        working-directory: pipeline
        run: python pipeline.py --date ${{ steps.date.outputs.date }} --stage generator

      - name: Publish to content/
        if: steps.guard.outputs.skip != 'true'
        run: python .github/scripts/publish_issue.py ${{ steps.date.outputs.date }}

      - name: Send newsletter
        if: steps.guard.outputs.skip != 'true' && github.event.inputs.dry_run != 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python .github/scripts/send_newsletter.py ${{ steps.date.outputs.date }}

      - name: Commit and push
        if: steps.guard.outputs.skip != 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.email "gh-actions@healthcareaibrief.com"
          git config user.name  "Healthcare AI Weekly Bot"
          git add content/
          if git diff --cached --quiet; then
            echo "No content changes to commit."
            exit 0
          fi
          git commit -m "newsletter: ${{ steps.date.outputs.date }}"
          git push

      - name: Upload run artifacts
        if: always() && steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-${{ steps.date.outputs.date }}
          path: |
            pipeline/data/issues/${{ steps.date.outputs.date }}/email.html
            pipeline/data/issues/${{ steps.date.outputs.date }}/index.html
            pipeline/data/curated/${{ steps.date.outputs.date }}.json
          retention-days: 14
          if-no-files-found: warn

      - name: Notify on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ISSUE_DATE: ${{ steps.date.outputs.date }}
          TRIGGER_EVENT: ${{ github.event_name }}
        run: python .github/scripts/notify_failure.py
