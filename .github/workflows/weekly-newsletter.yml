name: Weekly Newsletter

on:
  schedule:
    # Goal: an email in every inbox every Friday morning, no exceptions.
    #
    # GitHub cron is UTC-only and BEST-EFFORT: under load it delays or
    # silently drops scheduled events, and the early-UTC morning slots are
    # among the most oversubscribed windows there is. Relying on a punctual
    # morning grant is exactly what kept failing.
    #
    # Two-part reliability strategy:
    #   1. Fan out MANY attempts across a WIDE morning band (08-13 UTC =
    #      ~4-9am ET) so GitHub almost certainly grants at least one runner.
    #   2. The guard below NEVER rejects a run for being "late" — the first
    #      runner granted on Friday at/after 4:00am ET does the send, however
    #      delayed. It only refuses to send EARLY (pre-4am) or twice (the
    #      already-published dedup + concurrency group handle duplicates).
    #
    # So even on a morning where GitHub drops every early slot and doesn't
    # grant a runner until 8am ET, the issue still goes out that morning.
    # For minute-exact timing, drive workflow_dispatch from a punctual
    # external scheduler (see README) — this cron is the always-works floor.
    #
    # :02/:17/:32/:47 dodges the top-of-hour spike; 08-13 UTC covers both
    # daylight regimes (EDT 4-9am ET; EST 3-8am ET, pre-4am skipped by guard).
    - cron: '2,17,32,47 8-13 * * 5'
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Issue date (YYYY-MM-DD). Blank = today (UTC).'
        required: false
        default: ''
      dry_run:
        description: 'Generate only. Skip email send and git push.'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: weekly-newsletter
  cancel-in-progress: false

jobs:
  newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Compute issue date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date_override }}" ]; then
            DATE="${{ github.event.inputs.date_override }}"
          else
            DATE="$(date -u '+%Y-%m-%d')"
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "Issue date: $DATE"

      - name: Decide whether to send
        id: guard
        run: |
          DATE="${{ steps.date.outputs.date }}"

          # 1. IDEMPOTENCY (applies to every event type): if this issue was
          #    already generated and pushed by an earlier attempt today, never
          #    send it twice. Combined with the concurrency group, this makes
          #    the wide cron fan-out safe — only the first granted run sends.
          if [ -f "content/issues/$DATE/index.html" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Issue $DATE already published — an earlier attempt sent it. Skipping."
            exit 0
          fi

          # 2. Manual workflow_dispatch always proceeds — no time gate, so you
          #    can force a send (or recover a missed issue) at any hour.
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — proceeding with send for $DATE."
            exit 0
          fi

          # 3. Scheduled runs: we DO NOT reject a run for being late. GitHub
          #    routinely drops/delays the morning slots; the whole point is
          #    that whichever runner GitHub finally grants on Friday — even
          #    hours late — still sends. We only guard the two real hazards:
          #      - wrong day (belt-and-suspenders vs odd cron delivery)
          #      - too EARLY (before 4:00am ET — no pre-dawn emails)
          DOW="$(TZ='America/New_York' date '+%u')"          # 5 = Friday
          NOW_ET=$((10#$(TZ='America/New_York' date '+%H%M')))
          NOW_STR="$(TZ='America/New_York' date '+%a %H:%M %Z')"
          if [ "$DOW" != "5" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Not Friday in ET ($NOW_STR). Skipping."
          elif [ "$NOW_ET" -lt 400 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "$NOW_STR is before the 04:00 ET floor. Skipping (too early)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "$NOW_STR — Friday, after 04:00 ET, issue $DATE not yet published. Sending."
          fi

      - name: Run collector
        if: steps.guard.outputs.skip != 'true'
        working-directory: pipeline
        run: python pipeline.py --date ${{ steps.date.outputs.date }} --stage collector

      - name: Run curator
        if: steps.guard.outputs.skip != 'true'
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline.py --date ${{ steps.date.outputs.date }} --stage curator

      - name: Run generator
        if: steps.guard.outputs.skip != 'true'
        working-directory: pipeline
        run: python pipeline.py --date ${{ steps.date.outputs.date }} --stage generator

      - name: Publish to content/
        if: steps.guard.outputs.skip != 'true'
        run: python .github/scripts/publish_issue.py ${{ steps.date.outputs.date }}

      - name: Send newsletter
        if: steps.guard.outputs.skip != 'true' && github.event.inputs.dry_run != 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python .github/scripts/send_newsletter.py ${{ steps.date.outputs.date }}

      - name: Commit and push
        if: steps.guard.outputs.skip != 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.email "gh-actions@healthcareaibrief.com"
          git config user.name  "Healthcare AI Weekly Bot"
          git add content/
          if git diff --cached --quiet; then
            echo "No content changes to commit."
            exit 0
          fi
          git commit -m "newsletter: ${{ steps.date.outputs.date }}"
          git push

      - name: Upload run artifacts
        if: always() && steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-${{ steps.date.outputs.date }}
          path: |
            pipeline/data/issues/${{ steps.date.outputs.date }}/email.html
            pipeline/data/issues/${{ steps.date.outputs.date }}/index.html
            pipeline/data/curated/${{ steps.date.outputs.date }}.json
          retention-days: 14
          if-no-files-found: warn

      - name: Notify on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ISSUE_DATE: ${{ steps.date.outputs.date }}
          TRIGGER_EVENT: ${{ github.event_name }}
        run: python .github/scripts/notify_failure.py
